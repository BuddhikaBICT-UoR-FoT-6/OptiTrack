# OptiTrack Database Configuration (MySQL)
spring.application.name=optitrack-backend

# 1. Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/optitrack?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# 3. Security Configuration (JWT)
app.jwt.secret=${JWT_SECRET:OptiTrackSuperSecretKeyForJWTSigningMustBe256BitsLongAtLeast}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# 4. Initial Admin Account Configuration
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.admin.email=${ADMIN_EMAIL:admin@optitrack.com}

# 5. Logging
logging.level.org.springframework.security=WARN
logging.level.com.optitrack=INFO

# 6. Google Gemini AI Configuration
google.api.key=${GOOGLE_API_KEY:INSERT_YOUR_SECURE_KEY_HERE}

# 7. Weather Intelligence (OpenWeatherMap)
weather.api.key=${WEATHER_API_KEY:0532461d22d4dc5c69ebecfb9ff42ba7}
