# OptiTrack Database Configuration (MySQL)
spring.application.name=optitrack-backend

# 1. Database Connection
# Added 'allowPublicKeyRetrieval=true' to the connection string
spring.datasource.url=jdbc:mysql://localhost:3306/optitrack?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 3. JWT Security Properties
app.jwt.secret=OptiTrackSuperSecretKeyForJWTSigningMustBe256BitsLongAtLeast
app.jwt.expiration-ms=86400000
